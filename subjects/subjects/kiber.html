<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тесты по Кибер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --primary-light: #c4b5fd;
            --accent: #06b6d4;
            --accent-pink: #ec4899;
            --success: #10b981;
            --success-dark: #059669;
            --error: #f43f5e;
            --error-dark: #e11d48;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #0f0b1e;
            --surface: rgba(30, 23, 57, 0.65);
            --surface-solid: #1a1533;
            --text: #f1f0fa;
            --text-secondary: #a29fc4;
            --border: rgba(148, 130, 219, 0.25);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 15% 15%, rgba(124, 58, 237, 0.35), transparent 40%),
                radial-gradient(circle at 85% 20%, rgba(6, 182, 212, 0.25), transparent 40%),
                radial-gradient(circle at 50% 90%, rgba(236, 72, 153, 0.25), transparent 45%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--primary), var(--accent-pink), var(--primary));
            background-size: 300% 100%;
            animation: gradientShift 6s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        h1 i {
            -webkit-text-fill-color: initial;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-container {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 16px 26px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--text);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-results {
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stage-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.2,.8,.2,1);
            border: 1.5px solid var(--border);
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        .stage-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stage-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -10px rgba(124, 58, 237, 0.4);
        }

        .stage-card:hover::before {
            opacity: 1;
        }

        .stats-panel {
            background: linear-gradient(135deg, var(--primary), var(--accent-pink) 120%);
            border-radius: 20px;
            padding: 22px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px -8px rgba(124, 58, 237, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
        }

        .option {
            padding: 16px 20px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text);
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.25s cubic-bezier(.2,.8,.2,1);
            text-align: left;
            font-size: 1em;
        }

        .option:hover:not(:disabled) {
            transform: translateX(6px);
            border-color: var(--accent);
            box-shadow: 0 6px 20px -6px rgba(6, 182, 212, 0.4);
        }

        .option.correct {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
            border-color: var(--success);
            box-shadow: 0 6px 20px -4px rgba(16, 185, 129, 0.5);
        }

        .option.wrong {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
            border-color: var(--error);
            box-shadow: 0 6px 20px -4px rgba(244, 63, 94, 0.5);
        }

        .option:active:not(:disabled) {
            transform: scale(0.98);
        }

        .option:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        .option.selected {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 6px 20px -4px rgba(124, 58, 237, 0.5);
        }

        .session-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            color: white;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            box-shadow: 0 6px 16px -4px rgba(124, 58, 237, 0.5);
        }

        .review-item {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid var(--error);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .review-item .review-q {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .review-item .review-your {
            color: var(--error);
            margin-bottom: 6px;
        }

        .review-item .review-correct {
            color: var(--success);
        }

        .numbers-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 140px;
            overflow-y: auto;
            padding: 15px;
            background: var(--surface);
            border-radius: 16px;
            border: 2px solid var(--border);
        }

        .num-item {
            min-width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            background: var(--surface);
            color: var(--text);
        }

        .num-item:hover {
            border-color: var(--accent);
            transform: scale(1.08);
        }

        .num-item.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 14px -2px rgba(124, 58, 237, 0.6);
        }

        .num-item.correct {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
            border-color: var(--success);
        }

        .num-item.wrong {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
            border-color: var(--error);
        }

        .progress-section {
            margin: 20px 0;
        }

        .progress-bar {
            height: 12px;
            background: rgba(148, 130, 219, 0.15);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary), var(--accent-pink));
            background-size: 200% 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .timer {
            font-family: 'Space Grotesk', monospace;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .question-text {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            max-width: 90%;
            height: 100%;
            background: var(--surface-solid);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
            z-index: 1000;
            padding: 80px 20px 20px;
            overflow-y: auto;
            color: var(--text);
            border-left: 1px solid var(--border);
        }

        .side-panel.active {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 26px;
            border-radius: 14px;
            background: var(--surface-solid);
            border: 1px solid var(--border);
            color: var(--text);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5);
            z-index: 1100;
            animation: fadeIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(16px);
        }

        .hidden {
            display: none;
        }

        .grade-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            margin: 20px 0;
            filter: drop-shadow(0 0 25px currentColor);
        }

        .stats-box {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
        }

        .result-sticker {
            font-size: 5rem;
            margin: 10px 0 20px;
            line-height: 1;
            display: inline-block;
        }

        @keyframes stickerPop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.25) rotate(8deg); opacity: 1; }
            80% { transform: scale(0.95) rotate(-4deg); }
            100% { transform: scale(1) rotate(0); }
        }

        @keyframes stickerBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }

        @keyframes stickerWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }

        @keyframes stickerShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-6px) rotate(-4deg); }
            40% { transform: translateX(6px) rotate(4deg); }
            60% { transform: translateX(-4px) rotate(-2deg); }
            80% { transform: translateX(4px) rotate(2deg); }
        }

        .result-sticker.grade-5 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards, stickerBounce 1.4s ease-in-out 0.6s infinite;
        }

        .result-sticker.grade-4 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards, stickerWobble 1.8s ease-in-out 0.6s infinite;
        }

        .result-sticker.grade-3 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards;
        }

        .result-sticker.grade-2 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards, stickerShake 0.6s ease-in-out 0.7s;
        }

        .confetti-piece {
            position: fixed;
            top: -20px;
            width: 10px;
            height: 14px;
            opacity: 0.9;
            pointer-events: none;
            z-index: 1200;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(540deg); opacity: 0.4; }
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            h1 { font-size: 1.3rem; }
            .option { padding: 12px 16px; }
            .num-item { min-width: 40px; height: 40px; font-size: 0.85rem; }
            .btn { padding: 10px 16px; font-size: 0.85rem; }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .name-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 6, 24, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .name-modal {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px -10px rgba(124, 58, 237, 0.5);
            animation: stickerPop 0.4s cubic-bezier(.3,1.6,.5,1) forwards;
        }

        .name-modal h2 {
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 8px;
            font-size: 1.4rem;
        }

        .name-modal p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .name-modal input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 1em;
            outline: none;
            margin-bottom: 16px;
            text-align: center;
        }

        .name-modal input:focus {
            border-color: var(--accent);
        }

        .participants-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .greeting-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: statusPulse 1.6s ease-in-out infinite;
        }

        .status-dot.offline {
            background: var(--text-secondary);
            opacity: 0.5;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 6px var(--success); }
            50% { box-shadow: 0 0 14px var(--success); }
        }

        .online-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .db-section {
            margin-bottom: 20px;
            padding: 18px;
            border-radius: 16px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1.5px solid var(--border);
        }

        .db-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .db-title.new {
            color: var(--success);
            border-bottom-color: var(--success);
        }

        .db-title.old {
            color: var(--warning);
            border-bottom-color: var(--warning);
        }
    </style>

    <style>
        .back-to-hub {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(30, 23, 57, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 130, 219, 0.3);
            border-radius: 30px;
            color: #f1f0fa;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 8px 20px -4px rgba(0,0,0,0.4);
            transition: all 0.25s ease;
        }
        .back-to-hub:hover {
            transform: translateX(-3px);
            border-color: #06b6d4;
        }
    </style>
</head>
<body>
<a href="../index.html" class="back-to-hub"><i class="fas fa-arrow-left"></i> Все предметы</a>

    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-database"></i>
                Тесты по Кибер
                <i class="fas fa-graduation-cap"></i>
            </h1>
        </div>

        <div id="menu-screen">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск вопросов..." onkeyup="searchQuestions()">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="stats-panel">
                <h3><i class="fas fa-chart-line"></i> Ваша статистика</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalTests">0</div>
                        <div class="stat-label">Пройдено тестов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgScore">0%</div>
                        <div class="stat-label">Средний результат</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalErrors">0</div>
                        <div class="stat-label">Ошибок всего</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="bestScore">0%</div>
                        <div class="stat-label">Лучший результат</div>
                    </div>
                </div>
            </div>


            <div class="db-section">
                <div class="db-title new">🆕 НОВАЯ БАЗА (517 вопросов) - Кибербезопасность</div>
                <div style="display: flex; gap: 15px; margin: 15px 0; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="startNewBase()">
                        <i class="fas fa-play"></i> Начать тест (Новая база)
                    </button>
                    <button class="btn btn-primary" onclick="startNewBaseRandom30()">
                        <i class="fas fa-random"></i> Случайные 30
                    </button>
                    <button class="btn btn-primary" onclick="startNewBaseRandom50()">

    ["Какой протокол локальной сети является наиболее уязвимым из перечисленных ниже?", "WEP", "WPA", "WPA2", "Bluetooth"],
    ["К каким угрозам относятся 80% преступлений, связанных с компьютером или Интернетом ?", "Умышленные", "Открытые", "Внутренние", "Внешние"]
];


        const allQuestionsRaw = [...newQuestions, ...oldQuestions];

        const QUESTIONS_PER_STAGE = 30;
        const TOTAL_NEW_QUESTIONS = newQuestions.length;
        const TOTAL_OLD_QUESTIONS = oldQuestions.length;
        const TOTAL_QUESTIONS = allQuestionsRaw.length;

        let currentQuestions = [];
        let currentIdx = 0;
        let timerInterval;
        let currentStageName = '';


        function startNewBase() { startTest([...newQuestions], 'НОВАЯ БАЗА (все вопросы)'); }
        function startNewBaseRandom30() { startRandomN(newQuestions, 30, 'НОВАЯ БАЗА (случайные 30)'); }
        function startNewBaseRandom50() { startRandomN(newQuestions, 50, 'НОВАЯ БАЗА (случайные 50)'); }
        function startNewBaseRandom100() { startRandomN(newQuestions, 100, 'НОВАЯ БАЗА (случайные 100)'); }

        function startOldBase() { startTest([...oldQuestions], 'СТАРАЯ БАЗА (все вопросы)'); }
        function startOldBaseRandom30() { startRandomN(oldQuestions, 30, 'СТАРАЯ БАЗА (случайные 30)'); }
        function startOldBaseRandom50() { startRandomN(oldQuestions, 50, 'СТАРАЯ БАЗА (случайные 50)'); }
        function startOldBaseRandom100() { startRandomN(oldQuestions, 100, 'СТАРАЯ БАЗА (случайные 100)'); }

        function startAllBase() { startTest([...allQuestionsRaw], 'ВСЕ ВОПРОСЫ (Новая + Старая)'); }
        function startAllBaseRandom30() { startRandomN(allQuestionsRaw, 30, 'ВСЕ ВОПРОСЫ (случайные 30)'); }
        function startAllBaseRandom50() { startRandomN(allQuestionsRaw, 50, 'ВСЕ ВОПРОСЫ (случайные 50)'); }
        function startAllBaseRandom100() { startRandomN(allQuestionsRaw, 100, 'ВСЕ ВОПРОСЫ (случайные 100)'); }

        function startRandomN(questionsArray, n, name) {
            const shuffled = [...questionsArray].sort(() => Math.random() - 0.5);
            startTest(shuffled.slice(0, Math.min(n, questionsArray.length)), name);
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function shareResult() {
            const stats = document.getElementById('stats-display').innerText;
            navigator.clipboard.writeText(`Мой результат: ${stats}`);
            showToast('Результат скопирован! 📋');
        }

        function updateStats() {
            try {
                const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
                const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
                
                document.getElementById('totalTests').textContent = results.length;
                document.getElementById('totalErrors').textContent = errors.length;
                
                if (results.length > 0) {
                    const avg = results.reduce((a, b) => a + b.score, 0) / results.length;
                    document.getElementById('avgScore').textContent = Math.round(avg) + '%';
                    const best = Math.max(...results.map(r => r.score));
                    document.getElementById('bestScore').textContent = best + '%';
                }
            } catch(e) {
                console.error('Ошибка обновления статистики:', e);
            }
        }

        function searchQuestions() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            if (!term) {
                resultsDiv.innerHTML = '';
                return;
            }
            
            const results = [];
            for (let i = 0; i < allQuestionsRaw.length; i++) {
                if (allQuestionsRaw[i][0].toLowerCase().includes(term)) {
                    results.push({ index: i, question: allQuestionsRaw[i][0] });
                }
            }
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding: 20px; text-align: center;">Ничего не найдено 🔍</div>';
                return;
            }
            
            resultsDiv.innerHTML = results.slice(0, 20).map(r => `
                <div class="stage-card" style="margin-bottom: 10px; cursor: pointer;" onclick="startSingleQuestion(${r.index})">
                    <strong>Вопрос ${r.index + 1}</strong>
                    <p style="margin-top: 8px;">${r.question.substring(0, 100)}${r.question.length > 100 ? '...' : ''}</p>
                </div>
            `).join('');
        }

        function startSingleQuestion(idx) {
            startTest([allQuestionsRaw[idx]], 'Один вопрос');
            setTimeout(() => {
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchInput').value = '';
            }, 100);
        }

        function startErrorsOnly() {
            try {
                const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
                if (errors.length === 0) {
                    showToast('Нет вопросов с ошибками! 🎉', 'info');
                    return;
                }
                const errorQuestions = errors.map(e => allQuestionsRaw.find(q => q[0] === e.q)).filter(q => q);
                if (errorQuestions.length === 0) return;
                startTest(errorQuestions, 'Только ошибки');
            } catch(e) {
                showToast('Ошибка загрузки списка ошибок', 'info');
            }
        }

        function clearAllData() {
            if (confirm('Очистить ВСЮ статистику и историю ошибок? Это действие нельзя отменить!')) {
                localStorage.removeItem('tr_results');
                localStorage.removeItem('tr_errors');
                updateStats();
                renderSidebar();
                showToast('Все данные очищены');
            }
        }

        function startTest(qs, name) {
            if (!qs || qs.length === 0) {
                showToast('Нет вопросов для теста!', 'info');
                return;
            }
            
            currentQuestions = qs.map((q, idx) => {
                const correct = q[1];
                const opts = [...q.slice(1)].sort(() => Math.random() - 0.5);
                const globalIdx = allQuestionsRaw.findIndex(x => x[0] === q[0]);
                return { q: q[0], options: opts, correctIdx: opts.indexOf(correct), user: null, globalIndex: globalIdx };
            });
            currentStageName = name;
            currentIdx = 0;
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            renderNavigation();
            renderQuestion();
            startTimer();
        }

        function startTimer() {
            let time = 3600;
            if (timerInterval) clearInterval(timerInterval);
            const update = () => {
                if (time <= 0) {
                    clearInterval(timerInterval);
                    showResult();
                    return;
                }
                time--;
                const m = Math.floor(time / 60);
                const s = time % 60;
                document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
            };
            update();
            timerInterval = setInterval(update, 1000);
        }

        function renderNavigation() {
            const nav = document.getElementById('numbers-nav');
            nav.innerHTML = '';
            for (let i = 0; i < currentQuestions.length; i++) {
                const btn = document.createElement('div');
                btn.className = 'num-item';
                btn.textContent = i + 1;
                btn.onclick = () => { 
                    currentIdx = i; 
                    renderQuestion(); 
                    updateNavActive(); 
                };
                nav.appendChild(btn);
            }
            updateNavActive();
        }

        function updateNavActive() {
            const items = document.querySelectorAll('.num-item');
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
                if (i === currentIdx) items[i].classList.add('active');
                if (currentQuestions[i] && currentQuestions[i].user !== null) {
                    items[i].classList.remove('correct', 'wrong');
                    items[i].classList.add(currentQuestions[i].user === currentQuestions[i].correctIdx ? 'correct' : 'wrong');
                }
            }
        }

        function renderQuestion() {
            if (!currentQuestions[currentIdx]) return;
            
            const q = currentQuestions[currentIdx];
            const progress = ((currentIdx + 1) / currentQuestions.length * 100).toFixed(1);
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `Прогресс: ${currentIdx + 1}/${currentQuestions.length} (${progress}%)`;
            document.getElementById('question-counter').innerHTML = `<i class="fas fa-question-circle"></i> Вопрос ${currentIdx + 1} из ${currentQuestions.length}`;
            
            document.getElementById('q-text').innerHTML = `<span style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px;">Вопрос ${q.globalIndex + 1}</span><br>${escapeHtml(q.q)}`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerHTML = `<strong>${String.fromCharCode(65 + i)})</strong> ${escapeHtml(opt)}`;
                if (q.user !== null) {
                    btn.disabled = true;
                    if (i === q.correctIdx) btn.classList.add('correct');
                    if (i === q.user && i !== q.correctIdx) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => {
                        q.user = i;
                        const isCorrect = i === q.correctIdx;
                        if (isCorrect) {
                            showToast('✅ Правильно!', 'success');
                        } else {
                            showToast(`❌ Неправильно! Правильный ответ: ${q.options[q.correctIdx]}`, 'info');
                        }
                        renderQuestion();
                        updateNavActive();
                    };
                }
                box.appendChild(btn);
            });
            
            updateNavActive();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function prevQuestion() {
            if (currentIdx > 0) { 
                currentIdx--; 
                renderQuestion(); 
            }
        }

        function nextQuestion() {
            if (currentIdx < currentQuestions.length - 1) { 
                currentIdx++; 
                renderQuestion(); 
            } else { 
                showResult(); 
            }
        }

        function confirmFinish() {
            if (confirm('Завершить тест?')) showResult();
        }

        function showResult() {
            clearInterval(timerInterval);
            const correct = currentQuestions.filter(q => q.user === q.correctIdx).length;
            const percent = Math.round((correct / currentQuestions.length) * 100);
            let grade, color;
            if (percent >= 85) { grade = 5; color = '#10b981'; }
            else if (percent >= 70) { grade = 4; color = '#3b82f6'; }
            else if (percent >= 60) { grade = 3; color = '#f59e0b'; }
            else { grade = 2; color = '#ef4444'; }
            
            document.getElementById('grade-display').textContent = grade;
            document.getElementById('grade-display').style.color = color;
            document.getElementById('stats-display').innerHTML = `${correct}/${currentQuestions.length} (${percent}%)`;
            document.getElementById('details-display').innerHTML = `✅ Правильных: ${correct}<br>❌ Ошибок: ${currentQuestions.filter(q => q.user !== null && q.user !== q.correctIdx).length}<br>⏸ Без ответа: ${currentQuestions.filter(q => q.user === null).length}`;
            
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            try {
                const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
                results.unshift({ date: new Date().toLocaleString(), score: percent, correct, total: currentQuestions.length, grade });
                localStorage.setItem('tr_results', JSON.stringify(results.slice(0, 50)));
                
                const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
                currentQuestions.filter(q => q.user !== q.correctIdx).forEach(e => {
                    if (!errors.some(err => err.q === e.q)) {
                        errors.unshift({ q: e.q, a: e.options[e.correctIdx], date: new Date().toLocaleString() });
                    }
                });
                localStorage.setItem('tr_errors', JSON.stringify(errors.slice(0, 100)));
            } catch(e) {
                console.error('Ошибка сохранения результатов:', e);
            }
            
            updateStats();
            renderSidebar();
        }

        function renderSidebar() {
            try {
                const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
                const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
                
                const rDiv = document.getElementById('results-history');
                rDiv.innerHTML = results.slice(0, 15).map(r => `
                    <div style="padding: 12px; border-bottom: 1px solid var(--border-light);">
                        <div><strong>${escapeHtml(r.date)}</strong></div>
                        <div>Оценка: ${r.grade} (${r.score}%)</div>
                        <div>${r.correct}/${r.total} правильных</div>
                    </div>
                `).join('');
                if (results.length === 0) rDiv.innerHTML = '<p style="text-align: center;">Нет записей</p>';
                
                const eDiv = document.getElementById('errors-history');
                eDiv.innerHTML = errors.slice(0, 15).map(e => `
                    <div style="padding: 12px; border-bottom: 1px solid var(--border-light); margin-bottom: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 12px;">
                        <div><strong>❌ Вопрос:</strong> ${escapeHtml(e.q.substring(0, 80))}${e.q.length > 80 ? '...' : ''}</div>
                        <div><strong>✅ Ответ:</strong> ${escapeHtml(e.a)}</div>
                        <small>${escapeHtml(e.date)}</small>
                    </div>
                `).join('');
                if (errors.length === 0) eDiv.innerHTML = '<p style="text-align: center;">Ошибок нет! 🎉</p>';
            } catch(e) {
                console.error('Ошибка рендера боковой панели:', e);
            }
        }

        function clearResultsOnly() {
            if (confirm('Очистить историю результатов?')) {
                localStorage.removeItem('tr_results');
                updateStats();
                renderSidebar();
                showToast('История очищена');
            }
        }

        function clearErrorsOnly() {
            if (confirm('Очистить список ошибок?')) {
                localStorage.removeItem('tr_errors');
                renderSidebar();
                showToast('Ошибки очищены');
            }
        }

        function toggleSidePanel() {
            document.getElementById('side-panel').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            if (document.getElementById('side-panel').classList.contains('active')) renderSidebar();
        }

        function initMenu() {
            // Новая база - этапы
            if (TOTAL_NEW_QUESTIONS > 0) {
                const newContainer = document.getElementById('new-base-stages');
                const stages = Math.ceil(TOTAL_NEW_QUESTIONS / QUESTIONS_PER_STAGE);
                for (let i = 0; i < stages; i++) {
                    const start = i * QUESTIONS_PER_STAGE;
                    const end = Math.min(start + QUESTIONS_PER_STAGE, TOTAL_NEW_QUESTIONS);
                    const card = document.createElement('div');
                    card.className = 'stage-card';
                    card.innerHTML = `
                        <i class="fas fa-layer-group" style="font-size: 32px; color: var(--success); margin-bottom: 10px;"></i>
                        <h3>Новая база - Этап ${i + 1}</h3>
                        <p>Вопросы ${start + 1} - ${end}</p>
                        <div style="font-size: 0.85rem; opacity: 0.7;">${end - start} вопросов</div>
                    `;
                    card.onclick = () => startTest(newQuestions.slice(start, end), `НОВАЯ БАЗА - Этап ${i + 1}`);
                    newContainer.appendChild(card);
                }
            }

            // Старая база - этапы
            if (TOTAL_OLD_QUESTIONS > 0) {
                const oldContainer = document.getElementById('old-base-stages');
                const stages = Math.ceil(TOTAL_OLD_QUESTIONS / QUESTIONS_PER_STAGE);
                for (let i = 0; i < stages; i++) {
                    const start = i * QUESTIONS_PER_STAGE;
                    const end = Math.min(start + QUESTIONS_PER_STAGE, TOTAL_OLD_QUESTIONS);
                    const card = document.createElement('div');
                    card.className = 'stage-card';
                    card.innerHTML = `
                        <i class="fas fa-layer-group" style="font-size: 32px; color: var(--warning); margin-bottom: 10px;"></i>
                        <h3>Старая база - Этап ${i + 1}</h3>
                        <p>Вопросы ${start + 1} - ${end}</p>
                        <div style="font-size: 0.85rem; opacity: 0.7;">${end - start} вопросов</div>
                    `;
                    card.onclick = () => startTest(oldQuestions.slice(start, end), `СТАРАЯ БАЗА - Этап ${i + 1}`);
                    oldContainer.appendChild(card);
                }
            }
            
            updateStats();
            renderSidebar();
        }

        initMenu();
    </script>
</body>
</html>
