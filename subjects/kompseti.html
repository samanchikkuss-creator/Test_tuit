<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тесты по Компьютерным Сетям</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --primary-light: #c4b5fd;
            --accent: #06b6d4;
            --accent-pink: #ec4899;
            --success: #10b981;
            --success-dark: #059669;
            --error: #f43f5e;
            --error-dark: #e11d48;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #0f0b1e;
            --surface: rgba(30, 23, 57, 0.65);
            --surface-solid: #1a1533;
            --text: #f1f0fa;
            --text-secondary: #a29fc4;
            --border: rgba(148, 130, 219, 0.25);

        --old: #a78bfa;
        --new: #34d399;
        --category1: #a78bfa;
        --category2: #34d399;
        --category3: #fbbf24;
        --category4: #f472b6;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 15% 15%, rgba(124, 58, 237, 0.35), transparent 40%),
                radial-gradient(circle at 85% 20%, rgba(6, 182, 212, 0.25), transparent 40%),
                radial-gradient(circle at 50% 90%, rgba(236, 72, 153, 0.25), transparent 45%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        h1 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--primary), var(--accent-pink), var(--primary));
            background-size: 300% 100%;
            animation: gradientShift 6s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        h1 i {
            -webkit-text-fill-color: initial;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-container {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 16px 26px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--text);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-results {
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stage-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.2,.8,.2,1);
            border: 1.5px solid var(--border);
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        .stage-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stage-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -10px rgba(124, 58, 237, 0.4);
        }

        .stage-card:hover::before {
            opacity: 1;
        }

        .stats-panel {
            background: linear-gradient(135deg, var(--primary), var(--accent-pink) 120%);
            border-radius: 20px;
            padding: 22px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px -8px rgba(124, 58, 237, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
        }

        .option {
            padding: 16px 20px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text);
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.25s cubic-bezier(.2,.8,.2,1);
            text-align: left;
            font-size: 1em;
        }

        .option:hover:not(:disabled) {
            transform: translateX(6px);
            border-color: var(--accent);
            box-shadow: 0 6px 20px -6px rgba(6, 182, 212, 0.4);
        }

        .option.correct {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
            border-color: var(--success);
            box-shadow: 0 6px 20px -4px rgba(16, 185, 129, 0.5);
        }

        .option.wrong {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
            border-color: var(--error);
            box-shadow: 0 6px 20px -4px rgba(244, 63, 94, 0.5);
        }

        .option:active:not(:disabled) {
            transform: scale(0.98);
        }

        .option:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }

        .option.selected {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 6px 20px -4px rgba(124, 58, 237, 0.5);
        }

        .session-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            color: white;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            box-shadow: 0 6px 16px -4px rgba(124, 58, 237, 0.5);
        }

        .review-item {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid var(--error);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .review-item .review-q {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .review-item .review-your {
            color: var(--error);
            margin-bottom: 6px;
        }

        .review-item .review-correct {
            color: var(--success);
        }

        .numbers-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 140px;
            overflow-y: auto;
            padding: 15px;
            background: var(--surface);
            border-radius: 16px;
            border: 2px solid var(--border);
        }

        .num-item {
            min-width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            background: var(--surface);
            color: var(--text);
        }

        .num-item:hover {
            border-color: var(--accent);
            transform: scale(1.08);
        }

        .num-item.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 14px -2px rgba(124, 58, 237, 0.6);
        }

        .num-item.correct {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
            border-color: var(--success);
        }

        .num-item.wrong {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
            border-color: var(--error);
        }

        .progress-section {
            margin: 20px 0;
        }

        .progress-bar {
            height: 12px;
            background: rgba(148, 130, 219, 0.15);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary), var(--accent-pink));
            background-size: 200% 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .timer {
            font-family: 'Space Grotesk', monospace;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .question-text {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            max-width: 90%;
            height: 100%;
            background: var(--surface-solid);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
            z-index: 1000;
            padding: 80px 20px 20px;
            overflow-y: auto;
            color: var(--text);
            border-left: 1px solid var(--border);
        }

        .side-panel.active {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 26px;
            border-radius: 14px;
            background: var(--surface-solid);
            border: 1px solid var(--border);
            color: var(--text);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5);
            z-index: 1100;
            animation: fadeIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(16px);
        }

        .hidden {
            display: none;
        }

        .grade-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            margin: 20px 0;
            filter: drop-shadow(0 0 25px currentColor);
        }

        .stats-box {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
        }

        .result-sticker {
            font-size: 5rem;
            margin: 10px 0 20px;
            line-height: 1;
            display: inline-block;
        }

        @keyframes stickerPop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.25) rotate(8deg); opacity: 1; }
            80% { transform: scale(0.95) rotate(-4deg); }
            100% { transform: scale(1) rotate(0); }
        }

        @keyframes stickerBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }

        @keyframes stickerWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }

        @keyframes stickerShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-6px) rotate(-4deg); }
            40% { transform: translateX(6px) rotate(4deg); }
            60% { transform: translateX(-4px) rotate(-2deg); }
            80% { transform: translateX(4px) rotate(2deg); }
        }

        .result-sticker.grade-5 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards, stickerBounce 1.4s ease-in-out 0.6s infinite;
        }

        .result-sticker.grade-4 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards, stickerWobble 1.8s ease-in-out 0.6s infinite;
        }

        .result-sticker.grade-3 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards;
        }

        .result-sticker.grade-2 {
            animation: stickerPop 0.6s cubic-bezier(.3,1.6,.5,1) forwards, stickerShake 0.6s ease-in-out 0.7s;
        }

        .confetti-piece {
            position: fixed;
            top: -20px;
            width: 10px;
            height: 14px;
            opacity: 0.9;
            pointer-events: none;
            z-index: 1200;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(540deg); opacity: 0.4; }
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            h1 { font-size: 1.3rem; }
            .option { padding: 12px 16px; }
            .num-item { min-width: 40px; height: 40px; font-size: 0.85rem; }
            .btn { padding: 10px 16px; font-size: 0.85rem; }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .name-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 6, 24, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .name-modal {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px -10px rgba(124, 58, 237, 0.5);
            animation: stickerPop 0.4s cubic-bezier(.3,1.6,.5,1) forwards;
        }

        .name-modal h2 {
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 8px;
            font-size: 1.4rem;
        }

        .name-modal p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .name-modal input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 1em;
            outline: none;
            margin-bottom: 16px;
            text-align: center;
        }

        .name-modal input:focus {
            border-color: var(--accent);
        }

        .participants-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .greeting-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: statusPulse 1.6s ease-in-out infinite;
        }

        .status-dot.offline {
            background: var(--text-secondary);
            opacity: 0.5;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 6px var(--success); }
            50% { box-shadow: 0 0 14px var(--success); }
        }

        .online-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }


    .badge-info {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75em;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 8px;
        backdrop-filter: blur(8px);
    }

    .badge-old { background: rgba(167, 139, 250, 0.15); color: var(--old); border: 1.5px solid var(--old); }
    .badge-new { background: rgba(52, 211, 153, 0.15); color: var(--new); border: 1.5px solid var(--new); }
    .badge-cat1 { background: rgba(167, 139, 250, 0.15); color: var(--category1); border: 1.5px solid var(--category1); }
    .badge-cat2 { background: rgba(52, 211, 153, 0.15); color: var(--category2); border: 1.5px solid var(--category2); }
    .badge-cat3 { background: rgba(251, 191, 36, 0.15); color: var(--category3); border: 1.5px solid var(--category3); }

    .stage-card.cat1 { border-color: var(--category1); }
    .stage-card.cat2 { border-color: var(--category2); }
    .stage-card.cat3 { border-color: var(--category3); }
    .stage-card.cat4 { border-color: var(--category4); }
    .stage-card.special { border-color: var(--accent-pink); }

    .history-btn {
        width: 100%;
        padding: 14px;
        background: var(--surface);
        backdrop-filter: blur(12px);
        color: var(--text);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        transition: 0.25s;
    }

    .history-btn:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
    }

    .history-count {
        background: linear-gradient(135deg, var(--error), var(--error-dark));
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.85em;
    }

    .log-item {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9em;
        color: var(--text);
        transition: 0.2s;
        border-radius: 8px;
    }

    .log-item:hover { background: rgba(255,255,255,0.04); }

    .err-history-item {
        background: rgba(244, 63, 94, 0.08);
        border-left: 4px solid var(--error);
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 10px;
        font-size: 0.85em;
        color: var(--text);
        transition: 0.2s;
    }

    .err-history-item:hover { background: rgba(244, 63, 94, 0.15); }

    .btn-clear {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: rgba(244, 63, 94, 0.12);
        color: #fca5b1;
        border: 1.5px solid rgba(244, 63, 94, 0.35);
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.9em;
        font-weight: 600;
        transition: 0.2s;
    }

    .btn-clear:hover { background: rgba(244, 63, 94, 0.2); }

    .question-counter {
        font-size: 0.95em;
        color: var(--text-secondary);
        margin-bottom: 15px;
        font-weight: 500;
    }

    .question-label {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 0.8em;
        font-weight: 700;
        margin-bottom: 10px;
    }

    .label-old { background: rgba(167, 139, 250, 0.15); color: var(--old); }
    .label-new { background: rgba(52, 211, 153, 0.15); color: var(--new); }

    .navigation-buttons {
        display: flex;
        gap: 15px;
        margin-top: 25px;
    }

    .stage-info {

    const QUESTIONS_PER_STAGE = 25;
    const TOTAL_QUESTIONS = allQuestionsRaw.length;
    const TOTAL_STAGES = Math.ceil(TOTAL_QUESTIONS / QUESTIONS_PER_STAGE);

    let currentQuestions = [];
    let currentIdx = 0;
    let timerInterval;
    let currentStageType = '';

    function searchQuestions() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const resultsContainer = document.getElementById('searchResults');
        
        if (!searchTerm) {
            resultsContainer.innerHTML = '';
            return;
        }
        
        const results = [];
        
        for (let i = 0; i < allQuestionsRaw.length; i++) {
            const question = allQuestionsRaw[i][0];
            const correctAnswer = allQuestionsRaw[i][1];
            
            if (question.toLowerCase().includes(searchTerm)) {
                results.push({
                    index: i,
                    question: question,
                    correctAnswer: correctAnswer
                });
            }
            
            for (let j = 1; j < allQuestionsRaw[i].length; j++) {
                const answer = allQuestionsRaw[i][j];
                if (answer.toLowerCase().includes(searchTerm) && 
                    !results.some(r => r.index === i)) {
                    results.push({
                        index: i,
                        question: question,
                        correctAnswer: correctAnswer
                    });
                    break;
                }
            }
            
            if (results.length >= 50) break;
        }
        
        if (results.length === 0) {
            resultsContainer.innerHTML = `
                <div style="background: #fef2f2; border: 2px solid #fecaca; 
                           border-radius: 10px; padding: 15px; color: #991b1b; 
                           margin-top: 10px;">
                    🔍 Вопросов по запросу "${searchTerm}" не найдено
                </div>
            `;
            return;
        }
        
        let html = `
            <div style="background: #f0f9ff; border: 2px solid #bae6fd; 
                       border-radius: 10px; padding: 15px; margin-top: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <strong style="color: #0369a1;">Найдено вопросов: ${results.length}</strong>
                    <button onclick="clearSearch()" style="background: #dc2626; color: white; 
                           border: none; padding: 5px 15px; border-radius: 6px; 
                           cursor: pointer; font-size: 0.9em;">Очистить</button>
                </div>
                <div class="search-results-scroll">
        `;
        
        results.forEach((result, idx) => {
            const questionNumber = result.index + 1;
            const stageNum = Math.floor(result.index / QUESTIONS_PER_STAGE) + 1;
            
            let displayQuestion = highlightText(result.question, searchTerm);
            let displayAnswer = highlightText(result.correctAnswer, searchTerm);
            
            html += `
                <div class="search-result-item" onclick="startFromSearch(${result.index})">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span style="background: #dbeafe; color: #2563eb; 
                               padding: 3px 10px; border-radius: 15px; font-size: 0.85em; font-weight: 600;">
                            Вопрос ${questionNumber} (Этап ${stageNum})
                        </span>
                        <button style="background: #2563eb; color: white; border: none; 
                               padding: 5px 12px; border-radius: 6px; cursor: pointer; 
                               font-size: 0.85em; transition: 0.2s;"
                                onmouseover="this.style.backgroundColor='#1d4ed8'"
                                onmouseout="this.style.backgroundColor='#2563eb'"
                                onclick="event.stopPropagation(); startSingleQuestion(${result.index})">
                            Пройти этот вопрос
                        </button>
                    </div>
                    <div style="font-weight: 600; margin-bottom: 8px; line-height: 1.4;">
                        ${displayQuestion}
                    </div>
                    <div style="color: #059669; font-size: 0.95em; padding: 8px; 
                           background: #f0fdf4; border-radius: 6px; border-left: 3px solid #059669;">
                        <strong>Правильный ответ:</strong> ${displayAnswer}
                    </div>
                </div>
            `;
        });
        
        html += `</div></div>`;
        resultsContainer.innerHTML = html;
    }

    function highlightText(text, searchTerm) {
        if (!searchTerm) return text;
        
        const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<span class="search-mark">$1</span>');
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResults').innerHTML = '';
    }

    function startFromSearch(questionIndex) {
        const stageNum = Math.floor(questionIndex / QUESTIONS_PER_STAGE) + 1;
        const start = (stageNum - 1) * QUESTIONS_PER_STAGE;
        const end = Math.min(start + QUESTIONS_PER_STAGE, TOTAL_QUESTIONS);
        
        const questions = allQuestionsRaw.slice(start, end);
        currentStageType = `stage-${stageNum}`;
        
        startTest(questions, `Этап ${stageNum}`);
        
        setTimeout(() => {
            const questionInStage = questionIndex - start;
            currentIdx = questionInStage;
            renderQuestion();
            updateNavigationButtons();
            
            const qText = document.getElementById('q-text');
            qText.innerHTML = qText.innerHTML + '<div style="margin-top: 10px; padding: 8px; background: #fef3c7; border-radius: 6px; border-left: 3px solid #f59e0b;">🔍 Вы перешли к этому вопросу из поиска</div>';
        }, 100);
    }

    function startSingleQuestion(questionIndex) {
        const singleQuestion = [allQuestionsRaw[questionIndex]];
        currentStageType = 'single-question';
        
        startTest(singleQuestion, 'Один вопрос');
        
        setTimeout(() => {
            const qText = document.getElementById('q-text');
            qText.innerHTML = qText.innerHTML + `
                <div style="margin-top: 10px; padding: 10px; background: #e0f2fe; 
                           border-radius: 6px; border-left: 3px solid #0ea5e9;">
                    <strong>📝 Информация:</strong> Вопрос №${questionIndex + 1}
                </div>
            `;
        }, 100);
    }

    function toggleSidePanel() {
        document.getElementById('side-panel').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        if(document.getElementById('side-panel').classList.contains('active')) renderSidebarLogs();
    }

    function renderSidebarLogs() {
        const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
        const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
        const rBox = document.getElementById('results-history');
        const eBox = document.getElementById('errors-history');

        rBox.innerHTML = results.length ? '' : '<p style="color:#666; font-size:0.9em; text-align:center; padding:20px;">Нет записей</p>';
        results.slice(-15).reverse().forEach(res => {
            const time = res.time || '';
            rBox.innerHTML += `
                <div class="log-item">
                    <div style="font-weight:600; color:#1e293b;">Оценка: ${res.grade} | ${res.score}%</div>
                    <div style="font-size:0.85em; color:#64748b;">${res.date} ${time}</div>
                    <div style="font-size:0.8em; color:#94a3b8;">${res.correct}/${res.questions} правильных</div>
                </div>`;
        });

        eBox.innerHTML = errors.length ? '' : '<p style="color:#666; font-size:0.9em; text-align:center; padding:20px;">Ошибок нет</p>';
        errors.slice(-20).reverse().forEach(err => {
            eBox.innerHTML += `
                <div class="err-history-item">
                    <div style="font-weight:600; margin-bottom:5px;">${err.q}</div>
                    <div style="color:#059669; font-size:0.9em;">✅ ${err.a}</div>
                    ${err.date ? `<div style="font-size:0.75em; color:#94a3b8; margin-top:5px;">${err.date}</div>` : ''}
                </div>`;
        });
        document.getElementById('main-history-count').innerText = errors.length;
    }

    function clearResultsOnly() { 
        if(confirm("Удалить всю историю результатов?")) { 
            localStorage.removeItem('tr_results'); 
            renderSidebarLogs(); 
        } 
    }
    
    function clearErrorsOnly() { 
        if(confirm("Очистить список всех ошибок?")) { 
            localStorage.removeItem('tr_errors'); 
            renderSidebarLogs(); 
        } 
    }

    function initMenu() {
        const container = document.getElementById('stages-container');
        container.innerHTML = '';
        
        for(let i = 0; i < TOTAL_STAGES; i++) {
            const start = i * QUESTIONS_PER_STAGE;
            const end = Math.min((i + 1) * QUESTIONS_PER_STAGE, TOTAL_QUESTIONS);
            const questions = allQuestionsRaw.slice(start, end);
            
            const categoryColors = ['cat1', 'cat2', 'cat3', 'cat4'];
            const category = categoryColors[i % categoryColors.length];
            
            const card = document.createElement('div');
            card.className = `stage-card ${category}`;
            card.onclick = () => {
                currentStageType = `stage-${i+1}`;
                startTest(questions, i + 1);
            };
            
            card.innerHTML = `
                <span class="badge-info badge-${category}">Этап ${i+1}</span>
                <h3>Этап ${i+1}</h3>
                <p>Вопросы ${start + 1}-${end}</p>
                <div class="stage-info">${questions.length} вопросов</div>
            `;
            container.appendChild(card);
        }
        
        const allCard = document.createElement('div');
        allCard.className = 'stage-card special';
        allCard.style.marginTop = '20px';
        allCard.innerHTML = `
            <span class="badge-info" style="background: #fef3c7; color: #d97706; border: 2px solid #d97706;">Все вопросы</span>
            <h3>📚 Все вопросы</h3>
            <p>1-${TOTAL_QUESTIONS}</p>
            <div class="stage-info">${TOTAL_QUESTIONS} вопросов</div>
        `;
        allCard.onclick = () => {
            currentStageType = 'all';
            startTest(allQuestionsRaw, 'Все вопросы');
        };
        container.appendChild(allCard);
        
        renderSidebarLogs();
    }

    function startRandomTest(count) {
        const indices = Array.from({length: TOTAL_QUESTIONS}, (_, i) => i);
        const shuffled = [...indices].sort(() => Math.random() - 0.5);
        
        const selected = [];
        const maxQuestions = Math.min(count, TOTAL_QUESTIONS);
        
        for(let i = 0; i < maxQuestions; i++) {
            selected.push(allQuestionsRaw[shuffled[i]]);
        }
        
        currentStageType = `random-${count}`;
        startTest(selected, `Случайные ${count}`);
    }

    function startTest(qs, stageName) {
        currentQuestions = qs.map((q, index) => {
            const correct = q[1];
            const opts = q.slice(1).sort(() => Math.random() - 0.5);
            const globalIndex = allQuestionsRaw.findIndex(x => x[0] === q[0]);
            
            return { 
                q: q[0], 
                options: opts, 
                correctIdx: opts.indexOf(correct), 
                user: null,
                globalIndex: globalIndex
            };
        });
        
        currentIdx = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        
        document.getElementById('q-text').innerHTML = `<span style="background: #dbeafe; color: #2563eb; padding: 3px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 600; margin-right: 10px;">
            ${stageName}
        </span>`;
        
        createNav(); 
        renderQuestion(); 
        startTimer();
        updateNavigationButtons();
    }

    function startTimer() {
        let time = 3600; 
        clearInterval(timerInterval);
        
        const updateTimer = () => {
            time--;
            let m = Math.floor(time / 60);
            let s = time % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            
            if(time < 300) { 
                document.getElementById('timer').style.color = 'var(--error)';
            }
            
            if(time <= 0) {
                clearInterval(timerInterval);
                showResult();
            }
        };
        
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function createNav() {
        const nav = document.getElementById('numbers-nav'); 
        nav.innerHTML = '';
        
        const totalQuestions = currentQuestions.length;
        
        for(let i = 0; i < totalQuestions; i++) {
            addNumberButton(i, nav);
        }
    }
    
    function addNumberButton(index, nav) {
        const d = document.createElement('div');
        d.className = 'num-item'; 
        d.innerText = index + 1; 
        d.id = 'ni-' + index;
        d.title = `Вопрос ${index + 1}`;
        
        const q = currentQuestions[index];
        if(q.user !== null) {
            d.classList.add(q.user === q.correctIdx ? 'correct' : 'wrong');
        }
        
        if(index === currentIdx) {
            d.classList.add('active');
        }
        
        d.onclick = () => { 
            currentIdx = index; 
            renderQuestion(); 
            updateNavigationButtons();
        };
        nav.appendChild(d);
    }

    function updateNavigationButtons() {
        const navContainer = document.getElementById('navigation-buttons');
        navContainer.innerHTML = '';
        
        const totalQuestions = currentQuestions.length;
        
        const prevButton = document.createElement('button');
        prevButton.className = 'nav-button nav-button-prev';
        prevButton.innerHTML = '◀ Назад';
        prevButton.disabled = currentIdx === 0;
        prevButton.onclick = () => {
            if(currentIdx > 0) {
                currentIdx--;
                renderQuestion();
                updateNavigationButtons();
            }
        };
        navContainer.appendChild(prevButton);
        
        const nextButton = document.createElement('button');
        nextButton.className = 'nav-button nav-button-next';
        nextButton.innerHTML = currentIdx === totalQuestions - 1 ? 'Завершить тест' : 'Далее ▶';
        nextButton.onclick = () => {
            if(currentIdx < totalQuestions - 1) {
                currentIdx++;
                renderQuestion();
                updateNavigationButtons();
            } else {
                showResult();
            }
        };
        navContainer.appendChild(nextButton);
    }

    function renderQuestion() {
        const q = currentQuestions[currentIdx];
        
        const progress = ((currentIdx + 1) / currentQuestions.length * 100).toFixed(1);
        document.getElementById('progress-fill').style.width = `${progress}%`;
        document.getElementById('progress-text').innerText = `Прогресс: ${currentIdx + 1}/${currentQuestions.length} (${progress}%)`;
        document.getElementById('question-counter').innerText = `Вопрос ${currentIdx + 1} из ${currentQuestions.length}`;
        
        document.getElementById('q-text').innerHTML = `<span style="background: #dbeafe; color: #2563eb; padding: 3px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 600; margin-right: 10px;">
            Вопрос ${q.globalIndex + 1}
        </span>` + q.q;
        
        document.querySelectorAll('.num-item').forEach(el => {
            el.classList.remove('active');
            if(parseInt(el.innerText) === currentIdx + 1) {
                el.classList.add('active');
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        });
        
        const box = document.getElementById('options-box'); 
        box.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            
            const letter = String.fromCharCode(65 + i);
            
            if(q.user !== null) {
                if(i === q.correctIdx) {
                    btn.classList.add('correct');
                    btn.innerHTML = `<strong>${letter})</strong> ${opt} <span style="float:right;">✅</span>`;
                } else if(i === q.user) {
                    btn.classList.add('wrong');
                    btn.innerHTML = `<strong>${letter})</strong> ${opt} <span style="float:right;">❌</span>`;
                } else {
                    btn.innerHTML = `<strong>${letter})</strong> ${opt}`;
                }
            } else {
                btn.innerHTML = `<strong>${letter})</strong> ${opt}`;
            }
            
            btn.disabled = q.user !== null;
            
            btn.onclick = () => {
                q.user = i;
                const navItem = document.getElementById('ni-' + currentIdx);
                if(navItem) {
                    navItem.classList.add(i === q.correctIdx ? 'correct' : 'wrong');
                }
                renderQuestion();
                updateNavigationButtons();
            };
            
            box.appendChild(btn);
        });
        
        updateNavigationButtons();
    }

    function confirmFinish() { 
        const unanswered = currentQuestions.filter(q => q.user === null).length;
        let message = "Завершить тест?";
        
        if(unanswered > 0) {
            message = `Завершить тест? ${unanswered} вопрос${unanswered === 1 ? '' : 'а'} остал${unanswered === 1 ? 'ся' : 'ось'} без ответа.`;
        }
        
        if(confirm(message)) {
            showResult();
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const correctCount = currentQuestions.filter(q => q.user === q.correctIdx).length;
        const wrongCount = currentQuestions.filter(q => q.user !== null && q.user !== q.correctIdx).length;
        const unansweredCount = currentQuestions.filter(q => q.user === null).length;
        const percent = Math.round((correctCount / currentQuestions.length) * 100);
        
        let grade;
        let gradeColor;
        if(percent >= 85) {
            grade = 5;
            gradeColor = '#059669';
        } else if(percent >= 70) {
            grade = 4;
            gradeColor = '#3b82f6';
        } else if(percent >= 60) {
            grade = 3;
            gradeColor = '#f59e0b';
        } else {
            grade = 2;
            gradeColor = '#dc2626';
        }
        
        document.getElementById('grade-display').innerText = grade;
        document.getElementById('grade-display').style.color = gradeColor;
        document.getElementById('stats-display').innerText = `Результат: ${correctCount} из ${currentQuestions.length} (${percent}%)`;
        document.getElementById('details-display').innerHTML = `
            ✅ Правильных: ${correctCount}<br>
            ❌ Ошибок: ${wrongCount}<br>
            ⏸ Без ответа: ${unansweredCount}
        `;
        
        const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
        results.push({ 
            date: new Date().toLocaleDateString('ru-RU'), 
            time: new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}),
            grade: grade, 
            score: percent,
            questions: currentQuestions.length,
            correct: correctCount,
            wrong: wrongCount,
            unanswered: unansweredCount,
            stageType: currentStageType
        });
        localStorage.setItem('tr_results', JSON.stringify(results));
        
        const errorPool = JSON.parse(localStorage.getItem('tr_errors') || '[]');
        currentQuestions.filter(q => q.user !== q.correctIdx).forEach(e => {
            if(!errorPool.find(x => x.q === e.q)) {
                errorPool.push({ 
                    q: e.q, 
                    a: e.options[e.correctIdx],
                    date: new Date().toLocaleDateString('ru-RU'),
                    stageType: currentStageType
                });
            }
        });
        localStorage.setItem('tr_errors', JSON.stringify(errorPool));
        
        renderSidebarLogs();
    }
    
    window.onload = function() {
        console.log(`Всего вопросов: ${TOTAL_QUESTIONS}`);
        console.log(`Этапов по ${QUESTIONS_PER_STAGE} вопросов: ${TOTAL_STAGES}`);
        
        initMenu();
    };
</script>
